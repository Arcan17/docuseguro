name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: privrag
          POSTGRES_PASSWORD: privrag
          POSTGRES_DB: privrag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt aiosqlite

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://privrag:privrag@localhost:5432/privrag_test
          ANTHROPIC_API_KEY: test_key
          OPENAI_API_KEY: test_key
          LLM_PROVIDER: openai
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
          SPACY_ENABLED: "false"
        run: pytest -v --tb=short

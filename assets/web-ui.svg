<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg1" cx="80%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="-10%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161f3d"/>
      <stop offset="100%" stop-color="#121933"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ddc97"/>
      <stop offset="100%" stop-color="#22b377"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1100" height="640" fill="#0b1020"/>
  <rect width="1100" height="640" fill="url(#bg1)"/>
  <rect width="1100" height="640" fill="url(#bg2)"/>

  <!-- live pill -->
  <g>
    <rect x="461" y="40" width="178" height="34" rx="17" fill="#161f3d" stroke="#2a3566"/>
    <circle cx="486" cy="57" r="5" fill="#34d399"/>
    <circle cx="486" cy="57" r="9" fill="#34d399" opacity="0.18"/>
    <text x="502" y="62" fill="#9aa6d4" font-size="14">API en línea · groq</text>
  </g>

  <!-- hero -->
  <text x="550" y="138" text-anchor="middle" fill="#e7ecff" font-size="42" font-weight="700" letter-spacing="-1">Pregúntale lo que sea a tus documentos.</text>
  <text x="550" y="188" text-anchor="middle" fill="url(#grad)" font-size="42" font-weight="700" letter-spacing="-1">Sin filtrar datos sensibles.</text>
  <text x="550" y="228" text-anchor="middle" fill="#9aa6d4" font-size="17">PrivRAG borra los datos privados (RUT, correos, teléfonos) antes de que el texto llegue al LLM.</text>

  <!-- question pill -->
  <rect x="150" y="272" width="800" height="48" rx="10" fill="#121933" stroke="#2a3566"/>
  <text x="172" y="302" fill="#e7ecff" font-size="16">¿Cumplió el empleado con RUT 12.345.678-9 y correo ana@empresa.cl sus metas?</text>

  <!-- answer card -->
  <rect x="150" y="340" width="800" height="252" rx="14" fill="url(#panel)" stroke="#2a3566"/>
  <g transform="translate(172,366)">
    <rect x="0" y="0" width="22" height="22" rx="6" fill="#34d399" opacity="0.16"/>
    <text x="7" y="16" fill="#34d399" font-size="13" font-weight="700">3</text>
    <text x="34" y="16" fill="#9aa6d4" font-size="13" letter-spacing="1.5" font-weight="600">RESPUESTA</text>
  </g>

  <text x="172" y="424" fill="#e7ecff" font-size="16">El empleado 12.345.678-9 cumplió con los objetivos definidos en su contrato</text>
  <text x="172" y="450" fill="#e7ecff" font-size="16">durante el período evaluado, según el documento de desempeño.</text>

  <!-- badges -->
  <g transform="translate(172,486)" font-size="13">
    <!-- PII masked (green) -->
    <rect x="0" y="0" width="232" height="30" rx="15" fill="#34d399" opacity="0.14"/>
    <rect x="0" y="0" width="232" height="30" rx="15" fill="none" stroke="#34d399"/>
    <text x="16" y="20" fill="#34d399" font-weight="600">Datos privados ocultados: RUT, correo</text>

    <!-- cache (green) -->
    <rect x="244" y="0" width="150" height="30" rx="15" fill="#34d399" opacity="0.14"/>
    <rect x="244" y="0" width="150" height="30" rx="15" fill="none" stroke="#34d399"/>
    <text x="260" y="20" fill="#34d399" font-weight="600">Respuesta en caché</text>

    <!-- latency (indigo) -->
    <rect x="406" y="0" width="86" height="30" rx="15" fill="#1c2750" stroke="#6366f1"/>
    <text x="422" y="20" fill="#c3c9f5">267 ms</text>

    <!-- sources -->
    <rect x="504" y="0" width="96" height="30" rx="15" fill="#1c2750" stroke="#2a3566"/>
    <text x="520" y="20" fill="#9aa6d4">2 fuentes</text>

    <!-- provider -->
    <rect x="612" y="0" width="80" height="30" rx="15" fill="#1c2750" stroke="#2a3566"/>
    <text x="628" y="20" fill="#9aa6d4">groq</text>
  </g>

  <!-- footnote -->
  <text x="172" y="558" fill="#6b76a8" font-size="12.5">Los embeddings corren localmente · el LLM nunca ve tus datos privados</text>
</svg>

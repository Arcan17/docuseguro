# Development override: enables hot-reload and exposes DB port
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  app:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      LOG_LEVEL: DEBUG

  db:
    ports:
      - "5432:5432"

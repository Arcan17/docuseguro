[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash scripts/start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Cold-start downloads the embedding model + seeds demo docs before /health
# responds, which can exceed a short window and make Railway mark an otherwise
# healthy deploy as failed. 300s gives the startup room.
healthcheckPath = "/health"
healthcheckTimeout = 300

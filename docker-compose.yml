services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: privrag
      POSTGRES_PASSWORD: privrag
      POSTGRES_DB: privrag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privrag -d privrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://privrag:privrag@db:5432/privrag
      CHROMA_PATH: /app/.chroma
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - chroma_data:/app/.chroma

volumes:
  postgres_data:
  chroma_data:
